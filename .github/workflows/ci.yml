name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        # Unit tests only — no network, no LLM, no browser. The connector's
        # scrape path and the qualifier's Claude calls are exercised manually
        # via scripts/, not in CI.
        run: pytest
