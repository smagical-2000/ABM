# Fallback daily discovery run — use ONLY if the Railway "discovery-cron"
# service (Dockerfile.cron) is not available. Prefer Railway: it keeps the
# secrets and the Chromium image in one place. This workflow does the same full
# 24h, no-cap pull, just from GitHub's runners.
#
# Required repo secrets: DATABASE_URL, ANTHROPIC_API_KEY, APIFY_API_KEY.
# Optional repo variables: ANTHROPIC_MODEL and the DISCOVERY_* knobs.
name: discovery-cron

on:
  schedule:
    - cron: "0 14 * * *"        # 14:00 UTC ~= 10:00 America/New_York
  workflow_dispatch:            # allow a manual run from the Actions tab

concurrency:
  group: discovery-cron
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run discovery (full 24h, no cap)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          DISCOVERY_SIGNALBASE_MAX_PAGES: ${{ vars.DISCOVERY_SIGNALBASE_MAX_PAGES }}
          DISCOVERY_SIGNALBASE_PER_PAGE: ${{ vars.DISCOVERY_SIGNALBASE_PER_PAGE }}
          DISCOVERY_JOBS_MAX_ROWS: ${{ vars.DISCOVERY_JOBS_MAX_ROWS }}
        run: python scripts/run_discovery.py --days 1 --no-limit
