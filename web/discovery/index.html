<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discovery &amp; Scoring — Magical</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          colors: { 'zinc-150': '#ececee' },
        },
      },
    };
  </script>
  <style>
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .text-pretty { text-wrap: pretty; }
    .border-zinc-150 { border-color: #ececee; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 9999px; border: 3px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: #d4d4d8; background-clip: content-box; }

    @keyframes toastIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .animate-toast { animation: toastIn 0.22s cubic-bezier(0.16,1,0.3,1); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade { animation: fadeIn 0.18s ease-out; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .animate-pop { animation: popIn 0.2s cubic-bezier(0.16,1,0.3,1); }
    @keyframes spinSlow { to { transform: rotate(270deg); } }
    .animate-spin-slow { animation: spinSlow 1.3s linear infinite; transform-origin: center; }
  </style>
</head>
<body class="bg-[#fafafa]">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="api.js"></script>
  <script src="scoringData.js"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="panel.jsx"></script>
  <script type="text/babel" src="autoscore.jsx"></script>
  <script type="text/babel" src="drawer.jsx"></script>
  <script type="text/babel" src="scoringUI.jsx"></script>
  <script type="text/babel" src="scoreDrawer.jsx"></script>
  <script type="text/babel" src="csvImport.jsx"></script>
  <script type="text/babel" src="landingPage.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
